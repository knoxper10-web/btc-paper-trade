# File: .github/workflows/daily_trade.yml
name: Daily BTC Paper Trade

on:
  schedule:
    # 毎日 UTC 21:00 (日本時間 6:00) に実行
    - cron: '0 21 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  run-trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas numpy requests

      - name: Run paper trade
        run: python btc_paper_trade.py

      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add paper_trade_history.json paper_trade_performance.csv
          git diff --staged --quiet || git commit -m "Auto: Daily trade $(date -u +'%Y-%m-%d')"
          git push
